spec:
  source:
    path: .
    helm:
      valueFiles:
        - "../values.yaml"
service:
  type: NodePort
  port: 5678          # The internal service port
  targetPort: 5678    # The port n8n container is listening on
  nodePort: 30082  

config:
  database:
    type: postgresdb
    postgres:
      host: "192.168.100.46"
      port: 5432
      database: n8n
      user: n8n
      # The chart usually looks for a specific 'existingSecret' key
      existingSecret: "postgres-credentials"
      existingSecretPasswordKey: "password" 
 

apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "litellm-proxy.fullname" . }}-config
  labels:
    {{- include "litellm-proxy.labels" . | nindent 4 }}
data:
  config.yaml: |
{{ .Values.proxy_config | toYaml | indent 4 }}
  {{- range $key, $value := .Values.env }}
  {{ $key }}: {{ $value | quote }}
  {{- end }}

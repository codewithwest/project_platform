{{- if .Values.hooks.migration.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "litellm-proxy.fullname" . }}-migration
  labels:
    {{- include "litellm-proxy.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "-5"
    "helm.sh/hook-delete-policy": hook-succeeded
spec:
  template:
    spec:
      restartPolicy: Never
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: migration
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["/bin/sh", "-c"]
          args:
            - {{ .Values.hooks.migration.command | quote }}
          envFrom:
            - configMapRef:
                name: {{ include "litellm-proxy.fullname" . }}-config
            {{- if .Values.secretFrom }}
            - secretRef:
                name: {{ include "litellm-proxy.fullname" . }}-secrets
            {{- end }}
            {{- range .Values.envFromSecretRefs }}
            - secretRef:
                name: {{ . }}
            {{- end }}
          resources:
            {{- toYaml .Values.hooks.migration.resources | nindent 12 }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}

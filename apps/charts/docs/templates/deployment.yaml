apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "docs.fullname" . }}
  labels:
    {{- include "docs.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "docs.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "docs.selectorLabels" . | nindent 8 }}
    spec:
      containers:
        # 1. Nginx Service Container
        - name: nginx
          image: "{{ .Values.image.nginx }}"
          ports:
            - name: http
              containerPort: 80
              protocol: TCP
          volumeMounts:
            - name: content
              mountPath: /usr/share/nginx/html/repo
            - name: config
              mountPath: /usr/share/nginx/html/index.html
              subPath: index.html
            - name: config
              mountPath: /usr/share/nginx/html/_sidebar.md
              subPath: _sidebar.md
          resources:
            {{- toYaml .Values.resources | nindent 12 }}

        # 2. Git-Sync Sidecar
        - name: git-sync
          image: "{{ .Values.image.gitsync }}"
          args:
            - --repo={{ .Values.repo.url }}
            - --branch={{ .Values.repo.branch }}
            - --root=/tmp/git
            - --dest=repo
            - --wait=60
          volumeMounts:
            - name: content
              mountPath: /tmp/git
          {{- if .Values.repo.private }}
          env:
            - name: GIT_SYNC_USERNAME
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.repo.secretName }}
                  key: username
            - name: GIT_SYNC_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.repo.secretName }}
                  key: password
          {{- end }}

      volumes:
        - name: content
          emptyDir: {}
        - name: config
          configMap:
            name: {{ include "docs.fullname" . }}-config

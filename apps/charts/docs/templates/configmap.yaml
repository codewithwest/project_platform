apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "docs.fullname" . }}-config
data:
  index.html: |
    <!DOCTYPE html>
    <html lang="en">
    <head>
      <meta charset="UTF-8">
      <title>Project Platform Docs</title>
      <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
      <meta name="description" content="Documentation for the Project Platform">
      <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
      <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
      <style>
        :root {
          --theme-color: #6366f1;
        }
        .sidebar {
          background-color: #f8fafc;
        }
      </style>
    </head>
    <body>
      <div id="app">Loading cosmic documentation...</div>
      <script>
        window.$docsify = {
          name: 'Project Platform',
          repo: '{{ .Values.repo.url }}',
          loadSidebar: true,
          subMaxLevel: 2,
          auto2top: true,
          search: 'auto',
          // This ensures Docsify looks for files relative to the root
          basePath: './',
          // Specify the README.md as the homepage
          homepage: 'README.md'
        }
      </script>
      <!-- Docsify v4 -->
      <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
      <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
    </body>
    </html>

  _sidebar.md: |
    * [Home](/)
    * Services
      * [Argo CD](services/charts/argo/microk8s.md)
      * [Jenkins](services/charts/jenkins/readme.md)
    * Apps
      * [N8N](apps/charts/n8n/readme.md)
      * [Error Pages](docs/404-setup.md)
    * Guides
      * [MicroK8s](docs/microk8s.md)
      * [Helm](docs/helm.md)

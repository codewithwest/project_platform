n8n:
  image:
    repository: n8nio/n8n
    tag: stable
    pullPolicy: IfNotPresent

  # Corrected to reference your existing secret for n8n encryption
  existingEncryptionKeySecret: n8n-secret

  main:
    count: 1
    extraSecretNamesForEnvFrom:
      - n8n-secret
    extraEnvVars:
      N8N_RUNNERS_ENABLED: "true"
      N8N_RUNNERS_MODE: "external"
      N8N_RUNNERS_BROKER_LISTEN_ADDRESS: "0.0.0.0"
      N8N_RUNNERS_BROKER_PORT: "5679"
      N8N_NATIVE_PYTHON_RUNNER: "true"
      EXECUTIONS_MODE: "queue"
      QUEUE_BULL_REDIS_HOST: "n8n-redis-master"
      QUEUE_BULL_REDIS_PORT: "6379"
      # Reference the secret key directly instead of a Helm template string
      N8N_RUNNERS_AUTH_TOKEN:
        valueFrom:
          secretKeyRef:
            name: n8n-secret
            key: N8N_ENCRYPTION_KEY
    extraContainers:
      - name: task-runner
        image: n8nio/runners:2.12.3
        env:
          - name: N8N_RUNNERS_TASK_BROKER_URI
            value: "http://localhost:5679" # Main can use localhost for its sidecar
          - name: N8N_RUNNERS_AUTH_TOKEN
            valueFrom:
              secretKeyRef:
                name: n8n-secret
                key: N8N_ENCRYPTION_KEY
        resources:
          limits:
            cpu: 500m
            memory: 512Mi
          requests:
            cpu: 100m
            memory: 128Mi
    persistence:
      enabled: true
      storageClass: "microk8s-hostpath"
      size: 8Gi

  worker:
    count: 1
    concurrency: 5
    extraSecretNamesForEnvFrom:
      - n8n-secret
    extraEnvVars:
      N8N_RUNNERS_ENABLED: "true"
      N8N_RUNNERS_MODE: "external"
      EXECUTIONS_MODE: "queue"
      QUEUE_BULL_REDIS_HOST: "n8n-redis-master"
      QUEUE_BULL_REDIS_PORT: "6379"
      N8N_RUNNERS_AUTH_TOKEN:
        valueFrom:
          secretKeyRef:
            name: n8n-secret
            key: N8N_ENCRYPTION_KEY
    extraContainers:
      - name: task-runner
        image: n8nio/runners:2.12.3
        env:
          - name: N8N_RUNNERS_TASK_BROKER_URI
            # FIX: Workers must point to the Main Service DNS, not localhost
            value: "http://{{ include \"n8n.fullname\" . }}:5679" 
          - name: N8N_RUNNERS_AUTH_TOKEN
            valueFrom:
              secretKeyRef:
                name: n8n-secret
                key: N8N_ENCRYPTION_KEY
        resources:
          limits:
            cpu: 500m
            memory: 512Mi
          requests:
            cpu: 100m
            memory: 128Mi

  webhook:
    count: 1
    extraSecretNamesForEnvFrom:
      - n8n-secret
    extraEnvVars:
      N8N_RUNNERS_ENABLED: "true"
      N8N_RUNNERS_MODE: "external"

  # External DB & Redis Config
  externalPostgresql:
    host: postgres-postgresql.storage.svc.cluster.local
    port: 5432
    username: n8n
    database: n8n
    existingSecret: n8n-secret

  redis:
    enabled: true
    architecture: standalone
    auth:
      enabled: false # Ensure n8n-secret or redis secret has the password

service:
  type: NodePort
  port: 5678
  nodePort: 30082

persistence:
  enabled: true
  size: 10Gi
  storageClass: standard

# -------------------
# CORE CONFIG
# -------------------
config:
  DB_TYPE: postgresdb
  DB_POSTGRESDB_HOST: postgres-postgresql.storage.svc.cluster.local
  DB_POSTGRESDB_PORT: 5432
  DB_POSTGRESDB_DATABASE: n8n
  DB_POSTGRESDB_USER: n8n

  # queue mode 👇
  EXECUTIONS_MODE: queue
  QUEUE_BULL_REDIS_HOST: n8n-redis-master

  NODE_FUNCTION_ALLOW_BUILTIN: "*"

# -------------------
# SECRETS
# -------------------
env:
  DB_POSTGRESDB_PASSWORD:
    valueFrom:
      secretKeyRef:
        name: n8n-secret
        key: DB_POSTGRESDB_PASSWORD

  N8N_ENCRYPTION_KEY:
    valueFrom:
      secretKeyRef:
        name: n8n-secret
        key: N8N_ENCRYPTION_KEY

extraEnv:
  - name: N8N_LISTEN_ADDRESS
    value: "0.0.0.0"

# -------------------
# REDIS (enabled)
# -------------------
redis:
  enabled: true

# -------------------
# MAIN INSTANCE
# -------------------
main:
  mode: queue

# -------------------
# WEBHOOK PROCESSOR
# -------------------
webhook:
  enabled: true
  mode: queue
  replicaCount: 1

# -------------------
# WORKERS (RUNNERS)
# -------------------
worker:
  enabled: true
  mode: queue
  replicaCount: 2

  # 🔥 IMPORTANT
  waitMainNodeReady:
    enabled: true

# -------------------
# OPTIONAL AUTOSCALING
# -------------------
autoscaling:
  enabled: false
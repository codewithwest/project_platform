# File: charts/n8n/values.yaml

n8n:
  service:
    type: NodePort
    port: 5678
    nodePort: 30082

  persistence:
    enabled: true
    size: 10Gi
    storageClass: standard

main:
  config:
    db:
      type: postgresdb
      postgresdb:
        host: postgres-postgresql.storage.svc.cluster.local
        port: 5432
        database: n8n
        user: n8n
    node:
      function_allow_builtin: "*"

  secret:
    db:
      postgresdb:
        password:
          valueFrom:
            secretKeyRef:
              name: n8n-secret
              key: DB_POSTGRESDB_PASSWORD
    n8n:
      encryption_key:
        valueFrom:
          secretKeyRef:
            name: n8n-secret
            key: N8N_ENCRYPTION_KEY
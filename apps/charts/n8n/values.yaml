n8n:
  # 1. Global config (N8N_ prefix added automatically by chart)
  config:
    NATIVE_PYTHON_RUNNER: "true"
    LISTEN_ADDRESS: "0.0.0.0"

  timezone: "Africa/Johannesburg"
  defaultLocale: en

  # 2. Database & Redis
  db:
    type: postgresdb

  externalPostgresql:
    host: postgres-postgresql.storage.svc.cluster.local
    port: 5432
    username: n8n
    database: n8n
    existingSecret: n8n-secret # Must contain key: postgres-password

  redis:
    enabled: true
    auth:
      enabled: true

  # 3. Main Node
  main:
    count: 1
    extraSecretNamesForEnvFrom:
      - n8n-secret
    extraEnvVars:
      - name: N8N_RUNNERS_AUTH_TOKEN
        valueFrom:
          secretKeyRef:
            name: n8n-secret
            key: N8N_ENCRYPTION_KEY
    extraContainers:
      - name: task-runner
        image: n8nio/runners:2.12.3
        env:
          - name: N8N_RUNNERS_TASK_BROKER_URI
            value: "http://localhost:5679"
          - name: N8N_RUNNERS_AUTH_TOKEN
            valueFrom:
              secretKeyRef:
                name: n8n-secret
                key: N8N_ENCRYPTION_KEY
    persistence:
      enabled: true
      storageClass: "microk8s-hostpath"
      size: 8Gi

  # 4. Worker Node
  worker:
    mode: queue
    count: 1
    extraSecretNamesForEnvFrom:
      - n8n-secret
    extraEnvVars:
      - name: N8N_RUNNERS_AUTH_TOKEN
        valueFrom:
          secretKeyRef:
            name: n8n-secret
            key: N8N_ENCRYPTION_KEY
    extraContainers:
      - name: task-runner
        image: n8nio/runners:2.12.3
        env:
          - name: N8N_RUNNERS_TASK_BROKER_URI
            # Use the actual service name created by the subchart
            value: "http://n8n:5679" 
          - name: N8N_RUNNERS_AUTH_TOKEN
            valueFrom:
              secretKeyRef:
                name: n8n-secret
                key: N8N_ENCRYPTION_KEY

  # 5. Task Runner Mode
  taskRunners:
    mode: external
    broker:
      port: 5679

  # 6. Ingress
  ingress:
    enabled: true
    className: nginx
    annotations:
      nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    hosts:
      - host: n8n.westdynamics.io
        paths:
          - path: /
            pathType: Prefix
    tls:
      - secretName: n8n-tls-secret
        hosts:
          - n8n.westdynamics.io

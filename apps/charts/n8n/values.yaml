n8n:
  service:
    type: NodePort
    port: 5678
    nodePort: 30082

  persistence:
    enabled: true
    size: 5Gi

  extraEnv:
    DB_TYPE: postgresdb
    DB_POSTGRESDB_HOST: postgres-postgresql.storage.svc.cluster.local
    DB_POSTGRESDB_PORT: "5432"
    DB_POSTGRESDB_DATABASE: n8n
    DB_POSTGRESDB_USER: n8n
    DB_POSTGRESDB_PASSWORD:
      valueFrom:
        secretKeyRef:
          name: n8n-secret
          key: DB_POSTGRESDB_PASSWORD

    N8N_ENCRYPTION_KEY:
      valueFrom:
        secretKeyRef:
          name: n8n-secret
          key: N8N_ENCRYPTION_KEY

    N8N_HOST: n8n-app.local
    N8N_PORT: "5678"
    WEBHOOK_URL: http://n8n-app.local:30082/

# Remove old config.json volume so env vars take effect
config:
  nodeOverwrite: false
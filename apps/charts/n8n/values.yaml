n8n:
  image:
    repository: n8nio/n8n
    pullPolicy: IfNotPresent
    tag: ""
  imagePullSecrets: []
  nameOverride: ""
  fullnameOverride: ""

  service:
    enabled: true
    type: ClusterIP
    port: 5678

  nodes:
    builtin:
      enabled: false
      modules: []
    external:
      allowAll: false
      reinstallMissingPackages: false
      packages: []
    initContainer:
      image:
        repository: node
        tag: "22-alpine"
        pullPolicy: IfNotPresent
      resources:
        requests:
          cpu: 100m
          memory: 128Mi
        limits:
          cpu: 250m
          memory: 256Mi

  db:
    tablePrefix: ""
    type: postgresdb

    logging:
      enabled: false
      options: error
      maxQueryExecutionTime: 0

  main:
    count: 1
    extraSecretNamesForEnvFrom:
      - n8n-secret
    extraEnvVars:
      N8N_RUNNERS_ENABLED: "true"
      N8N_RUNNERS_MODE: "external"
      N8N_RUNNERS_BROKER_LISTEN_ADDRESS: "0.0.0.0"
      N8N_RUNNERS_BROKER_PORT: "5679"
      N8N_NATIVE_PYTHON_RUNNER: "true"
    extraContainers:
      - name: task-runner
        image: n8nio/runners:2.12.3
        env:
          - name: N8N_RUNNERS_TASK_BROKER_URI
            value: "http://127.0.0.1:5679"
          - name: N8N_RUNNERS_AUTH_TOKEN
            valueFrom:
              secretKeyRef:
                name: n8n-secret
                key: N8N_ENCRYPTION_KEY
    persistence:
      enabled: true
      volumeName: "n8n-main-pv"
      storageClass: "microk8s-hostpath"
      size: 8Gi
  # --- WORKER SECTION (Now correctly un-indented) ---
  worker:
    mode: queue
    count: 1
    extraSecretNamesForEnvFrom:
      - n8n-secret
    extraEnvVars:
      N8N_RUNNERS_ENABLED: "true"
      N8N_RUNNERS_MODE: "external"
    extraContainers:
      - name: task-runner
        image: n8nio/runners:2.12.3
        env:
          - name: N8N_RUNNERS_TASK_BROKER_URI
            value: "http://127.0.0.1:5679"
          - name: N8N_RUNNERS_AUTH_TOKEN
            valueFrom:
              secretKeyRef:
                name: n8n-secret
                key: N8N_ENCRYPTION_KEY
    persistence:
      enabled: true
      volumeName: "n8n-worker-pv"
      storageClass: "microk8s-hostpath"
      size: 8Gi

  # --- WEBHOOK SECTION (Now correctly un-indented) ---
  webhook:
    mode: queue
    count: 1
    extraSecretNamesForEnvFrom:
      - n8n-secret
    extraEnvVars:
      N8N_RUNNERS_ENABLED: "true"
      N8N_RUNNERS_MODE: "external"
  taskRunners:
    mode: external
    taskTimeout: 60
    taskHeartbeatInterval: 30
    maxConcurrency: 2
    broker:
      address: "0.0.0.0"
      port: 5679
    external:
      mainNodeAuthToken: ""
      workerNodeAuthToken: ""
      autoShutdownTimeout: 15
      port: 5680
      nodeOptions:
        - "--max-semi-space-size=16"
        - "--max-old-space-size=300"
      resources:
        requests:
          cpu: 100m
          memory: 32Mi
        limits:
          cpu: 250m
          memory: 256Mi

  timezone: "Africa/Johannesburg"
  defaultLocale: en
  gracefulShutdownTimeout: 30

  ingress:
    enabled: true
    className: nginx
    annotations:
      nginx.ingress.kubernetes.io/proxy-body-size: "50m"
      # kubernetes.io/tls-acme: "true"
    hosts:
      - host: n8n.westdynamics.io
        paths:
          - path: /
            pathType: Prefix
    tls:
      - secretName: n8n-tls-secret
        hosts:
          - n8n.westdynamics.io

  redis:
    enabled: true
    architecture: standalone

    image:
      repository: bitnamilegacy/redis

    auth:
      enabled: true

    master:
      service:
        ports:
          redis: 6379

      persistence:
        enabled: false

  externalPostgresql:
    host: postgres-postgresql.storage.svc.cluster.local
    port: 5432
    username: n8n
    database: n8n
    # ❗ leave password empty OR remove it
    # password: ""
    existingSecret: n8n-secret

service:
  type: NodePort
  port: 5678
  # Many charts expect it under 'nodePorts' (plural) and mapped to the protocol/name
  nodePorts:
    http: 30082

main:
  mode: queue
  persistence:
    enabled: true
    volumeName: "n8n-main-data"
    mountPath: "/home/node/.n8n"
    size: 8Gi
    accessMode: ReadWriteOnce
    storageClass: "fast-ssd"
    annotations:
      helm.sh/resource-policy: keep
  extraContainers:
    - name: task-runner
      image: n8nio/runners:latest
      ports:
        - containerPort: 5681
      env:
        # 🚀 Because it's a sidecar, it shares the pod's network namespace!
        - name: N8N_RUNNERS_TASK_BROKER_URI
          value: "http://localhost:5679"
        - name: N8N_RUNNERS_AUTH_TOKEN
          valueFrom:
            secretKeyRef:
              name: n8n-secret
              key: DB_POSTGRESDB_PASSWORD
# -------------------
# CORE CONFIG
# -------------------
config:
  DB_TYPE: postgresdb
  DB_POSTGRESDB_HOST: postgres-postgresql.storage.svc.cluster.local
  DB_POSTGRESDB_PORT: 5432
  DB_POSTGRESDB_DATABASE: n8n
  DB_POSTGRESDB_USER: n8n

  EXECUTIONS_MODE: queue
  QUEUE_BULL_REDIS_HOST: n8n-redis-master

  # runners
  N8N_RUNNERS_ENABLED: "true"
  N8N_RUNNERS_MODE: external
  N8N_RUNNERS_BROKER_LISTEN_ADDRESS: 0.0.0.0

  NODE_FUNCTION_ALLOW_BUILTIN: "*"

# -------------------
# SECRETS (REUSED)
# -------------------
env:
  DB_POSTGRESDB_PASSWORD:
    valueFrom:
      secretKeyRef:
        name: n8n-secret
        key: DB_POSTGRESDB_PASSWORD

  N8N_ENCRYPTION_KEY:
    valueFrom:
      secretKeyRef:
        name: n8n-secret
        key: N8N_ENCRYPTION_KEY

  # 🔥 REUSING SAME SECRET FOR RUNNERS
  N8N_RUNNERS_AUTH_TOKEN:
    valueFrom:
      secretKeyRef:
        name: n8n-secret
        key: DB_POSTGRESDB_PASSWORD

extraEnv:
  - name: N8N_LISTEN_ADDRESS
    value: "0.0.0.0"

# -------------------
# REDIS
# -------------------
redis:
  enabled: true

# -------------------
# ARCHITECTURE
# -------------------


webhook:
  enabled: true
  mode: queue
  replicaCount: 1

worker:
  enabled: true
  mode: queue
  replicaCount: 2

  waitMainNodeReady:
    enabled: true
  persistence:
    enabled: true
    volumeName: "n8n-worker-data"
    mountPath: "/home/node/.n8n"
    size: 5Gi
    accessMode: ReadWriteMany  # For autoscaling
    storageClass: "fast-ssd"

n8n:
  image:
    repository: n8nio/n8n
    pullPolicy: IfNotPresent
    tag: ""
  imagePullSecrets: []
  nameOverride: ""
  fullnameOverride: ""

  service:
    enabled: true
    type: NodePort
    port: 5678
    name: http
    annotations: {}
    labels: {}

  nodes:
    builtin:
      enabled: false
      modules: []
    external:
      allowAll: false
      reinstallMissingPackages: false
      packages: []
    initContainer:
      image:
        repository: node
        tag: "24-alpine"
        pullPolicy: IfNotPresent
      resources:
        requests:
          cpu: 100m
          memory: 128Mi
        limits:
          cpu: 500m
          memory: 256Mi

  db: 
    tablePrefix: ""
    type: postgresdb

    logging:
      enabled: false
      options: error
      maxQueryExecutionTime: 0

    # postgresdb:
    #   poolSize: 2
    #   connectionTimeout: 20000
    #   idleConnectionTimeout: 30000
    #   schema: public
    #   ssl:
    #     enabled: false
    #     base64EncodedCertificateAuthorityFile: ""
    #     base64EncodedCertFile: ""
    #     base64EncodedPrivateKeyFile: ""
    #     existingCertificateAuthorityFileSecret:
    #       name: ""
    #       # -- The key of the certificate authority file in the existing secret.
    #       key: "ca.crt"
    #     # -- The PostgreSQL existing certificate file secret.
    #     existingCertFileSecret:
    #       # -- The name of the existing secret.
    #       name: ""
    #       # -- The key of the certificate file in the existing secret.
    #       key: "cert.crt"
    #     # -- The PostgreSQL existing SSL private key file secret.
    #     existingPrivateKeyFileSecret:
    #       # -- The name of the existing secret.
    #       name: ""
    #       # -- The key of the SSL private key file in the existing secret.
    #       key: "cert.key"
    #     # -- If n8n should reject unauthorized SSL connections (true) or not (false).
    #     rejectUnauthorized: true

  main:
    count: 1
    editorBaseUrl: ""
    forceToUseStatefulset: false

    persistence:
      enabled: true
      volumeName: "n8n-main-pv"
      existingClaim: ""
      mountPath: "/home/node/.n8n"
      subPath: ""
      storageClass: ""
      accessMode: ReadWriteOnce
      size: 8Gi
      annotations:
        helm.sh/resource-policy: keep
      labels: {}

  worker:
    # -- Use `regular` to use main node as executer, or use `queue` to have worker nodes
    mode: queue
    concurrency: 10
    count: 2
    allNodes: false
    autoscaling:
      enabled: false
      minReplicas: 1
      maxReplicas: 2

    persistence:
      enabled: true
      volumeName: "n8n-worker-pv"
      existingClaim: ""
      mountPath: "/home/node/.n8n"
      accessMode: ReadWriteOnce
      size: 8Gi
      annotations:
        helm.sh/resource-policy: keep
      labels: {}

  existingEncryptionKeySecret: n8n-secret
  webhook:
    mode: queue
    url: ""
    count: 2
    allNodes: false
    autoscaling:
      enabled: false
      minReplicas: 1
      maxReplicas: 2

  taskRunners:
    mode: external
    taskTimeout: 60
    taskHeartbeatInterval: 30
    maxConcurrency: 5
    broker:
      address: "127.0.0.1"
      port: 5679
    external:
      mainNodeAuthToken: ""
      workerNodeAuthToken: ""
      autoShutdownTimeout: 15
      port: 5680
      nodeOptions:
        - "--max-semi-space-size=16"
        - "--max-old-space-size=300"
      resources:
        requests:
          cpu: 100m
          memory: 32Mi
        limits:
          cpu: 500m
          memory: 512Mi

  timezone: "Africa/Johannesburg"
  defaultLocale: en
  gracefulShutdownTimeout: 30

  ingress:
    enabled: false
    className: ""
    annotations: {}
      # kubernetes.io/ingress.class: nginx
      # kubernetes.io/tls-acme: "true"
    hosts:
      - host: n8n.local
        paths:
          - path: /
            pathType: Prefix
    tls: []
    #  - secretName: n8n-tls
    #    hosts:
    #      - n8n.local

  redis:
    enabled: true
    architecture: standalone

    image:
      repository: bitnamilegacy/redis

    auth:
      enabled: true

    master:
      service:
        ports:
          redis: 6379

      persistence:
        enabled: false

  externalPostgresql:
    host: postgres-postgresql.storage.svc.cluster.local
    port: 5432
    username: postgres
    database: n8n
    # ❗ leave password empty OR remove it
    # password: ""
    existingSecret: n8n-secret

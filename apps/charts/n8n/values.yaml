n8n:
  # 🚀 CRITICAL: This enables the deployment of workers and webhooks
  scaling:
    enabled: true

  service:
    type: NodePort
    port: 5678
    nodePort: 30082 

  main:
    mode: queue
    persistence:
      enabled: true
      size: 8Gi
      storageClass: "fast-ssd"
      accessMode: ReadWriteOnce
    # Sidecar injection for the Task Runner
    extraContainers:
      - name: task-runner
        image: n8nio/runners:latest
        env:
          - name: N8N_RUNNERS_TASK_BROKER_URI
            value: "http://localhost:5679"
          - name: N8N_RUNNERS_AUTH_TOKEN
            valueFrom:
              secretKeyRef:
                name: n8n-secret
                key: DB_POSTGRESDB_PASSWORD

  config:
    DB_TYPE: postgresdb
    DB_POSTGRESDB_HOST: postgres-postgresql.storage.svc.cluster.local
    DB_POSTGRESDB_PORT: 5432
    DB_POSTGRESDB_DATABASE: n8n
    DB_POSTGRESDB_USER: n8n
    EXECUTIONS_MODE: queue
    QUEUE_BULL_REDIS_HOST: n8n-redis-master
    N8N_RUNNERS_ENABLED: "true"
    N8N_RUNNERS_MODE: external
    N8N_RUNNERS_BROKER_LISTEN_ADDRESS: 0.0.0.0
    NODE_FUNCTION_ALLOW_BUILTIN: "*"

  env:
    DB_POSTGRESDB_PASSWORD:
      valueFrom:
        secretKeyRef: { name: n8n-secret, key: DB_POSTGRESDB_PASSWORD }
    N8N_ENCRYPTION_KEY:
      valueFrom:
        secretKeyRef: { name: n8n-secret, key: N8N_ENCRYPTION_KEY }
    N8N_RUNNERS_AUTH_TOKEN:
      valueFrom:
        secretKeyRef: { name: n8n-secret, key: DB_POSTGRESDB_PASSWORD }

  worker:
    enabled: true
    replicaCount: 2
    persistence:
      enabled: true
      size: 5Gi
      storageClass: "fast-ssd"
      # Note: Change to ReadWriteOnce if your SSDs don't support multi-node mounting
      accessMode: ReadWriteOnce 
    extraContainers:
      - name: task-runner
        image: n8nio/runners:latest
        env:
          - name: N8N_RUNNERS_TASK_BROKER_URI
            value: "http://localhost:5679"
          - name: N8N_RUNNERS_AUTH_TOKEN
            valueFrom:
              secretKeyRef:
                name: n8n-secret
                key: DB_POSTGRESDB_PASSWORD

  webhook:
    enabled: true
    replicaCount: 1

  redis:
    enabled: true
n8n:
  service:
    type: NodePort
    port: 5678
    nodePort: 30082

  persistence:
    enabled: true
    size: 10Gi

  # Use env instead of config.database (more reliable)
  extraEnv:
    DB_TYPE: postgresdb
    DB_POSTGRESDB_HOST: postgres-postgresql.storage.svc.cluster.local
    DB_POSTGRESDB_PORT: "5432"
    DB_POSTGRESDB_DATABASE: n8n
    DB_POSTGRESDB_USER: n8n
    DB_POSTGRESDB_PASSWORD:
      valueFrom:
        secretKeyRef:
          name: n8n-secret
          key: DB_POSTGRESDB_PASSWORD

    # 🔐 REQUIRED (people forget this and regret it later)
    N8N_ENCRYPTION_KEY: 
      valueFrom:
        secretKeyRef:
          name: n8n-secret
          key: N8N_ENCRYPTION_KEY

    # 🌐 Webhook/URL config
    N8N_HOST: localhost
    N8N_PORT: "5678"
    WEBHOOK_URL: http://192.168.100.46:30082/
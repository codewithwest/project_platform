service:
  type: NodePort
  port: 5678
  nodePort: 30082

persistence:
  enabled: true
  size: 10Gi
  storageClass: standard

# -------------------
# CORE CONFIG
# -------------------
config:
  DB_TYPE: postgresdb
  DB_POSTGRESDB_HOST: postgres-postgresql.storage.svc.cluster.local
  DB_POSTGRESDB_PORT: 5432
  DB_POSTGRESDB_DATABASE: n8n
  DB_POSTGRESDB_USER: n8n

  EXECUTIONS_MODE: queue
  QUEUE_BULL_REDIS_HOST: n8n-redis-master

  # runners
  N8N_RUNNERS_ENABLED: "true"
  N8N_RUNNERS_MODE: external
  N8N_RUNNERS_BROKER_LISTEN_ADDRESS: 0.0.0.0

  NODE_FUNCTION_ALLOW_BUILTIN: "*"

# -------------------
# SECRETS (REUSED)
# -------------------
env:
  DB_POSTGRESDB_PASSWORD:
    valueFrom:
      secretKeyRef:
        name: n8n-secret
        key: DB_POSTGRESDB_PASSWORD

  N8N_ENCRYPTION_KEY:
    valueFrom:
      secretKeyRef:
        name: n8n-secret
        key: N8N_ENCRYPTION_KEY

  # 🔥 REUSING SAME SECRET FOR RUNNERS
  N8N_RUNNERS_AUTH_TOKEN:
    valueFrom:
      secretKeyRef:
        name: n8n-secret
        key: DB_POSTGRESDB_PASSWORD

extraEnv:
  - name: N8N_LISTEN_ADDRESS
    value: "0.0.0.0"

# -------------------
# REDIS
# -------------------
redis:
  enabled: true

# -------------------
# ARCHITECTURE
# -------------------
main:
  mode: queue

webhook:
  enabled: true
  mode: queue
  replicaCount: 1

worker:
  enabled: true
  mode: queue
  replicaCount: 2

  waitMainNodeReady:
    enabled: true

# -------------------
# RUNNERS (THIS IS THE KEY PART)
# -------------------
taskRunners:
  enabled: true

  image:
    repository: n8nio/runners
    tag: latest

  env:
    N8N_RUNNERS_TASK_BROKER_URI: http://n8n:5679

    # reuse SAME secret
    N8N_RUNNERS_AUTH_TOKEN:
      valueFrom:
        secretKeyRef:
          name: n8n-secret
          key: DB_POSTGRESDB_PASSWORD
n8n:
  image:
    repository: n8nio/n8n
    pullPolicy: IfNotPresent
    tag: ""
  imagePullSecrets: []
  nameOverride: ""
  fullnameOverride: ""

  service:
    enabled: true
    type: ClusterIP
    port: 5678

  nodes:
    builtin:
      enabled: false
      modules: []
    external:
      allowAll: false
      reinstallMissingPackages: false
      packages: []
    initContainer:
      image:
        repository: node
        tag: "22-alpine"
        pullPolicy: IfNotPresent
      resources:
        requests:
          cpu: 100m
          memory: 128Mi
        limits:
          cpu: 250m
          memory: 256Mi

  db:
    tablePrefix: ""
    type: postgresdb

    logging:
      enabled: false
      options: error
      maxQueryExecutionTime: 0

  main:
    count: 1
    editorBaseUrl: ""
    forceToUseStatefulset: false
    extraSecretNamesForEnvFrom:
      - n8n-secret

    persistence:
      enabled: true
      volumeName: "n8n-main-pv"
      existingClaim: ""
      mountPath: "/home/node/.n8n"
      subPath: ""
      storageClass: "microk8s-hostpath"
      accessMode: ReadWriteOnce
      size: 8Gi
      annotations:
        helm.sh/resource-policy: keep
      labels: {}

  worker:
    # -- Use `regular` to use main node as executer, or use `queue` to have worker nodes
    mode: queue
    concurrency: 5
    count: 1
    allNodes: false
    autoscaling:
      enabled: false
      minReplicas: 1
      maxReplicas: 2

    persistence:
      enabled: true
      volumeName: "n8n-worker-pv"
      existingClaim: ""
      storageClass: "microk8s-hostpath"
      mountPath: "/home/node/.n8n"
      accessMode: ReadWriteOnce
      size: 8Gi
      annotations:
        helm.sh/resource-policy: keep
      labels: {}
    extraSecretNamesForEnvFrom:
      - n8n-secret

  existingEncryptionKeySecret: n8n-secret
  webhook:
    mode: queue
    url: ""
    count: 1
    allNodes: false
    autoscaling:
      enabled: false
      minReplicas: 1
      maxReplicas: 2
    extraSecretNamesForEnvFrom:
      - n8n-secret

  taskRunners:
    mode: internal
    taskTimeout: 60
    taskHeartbeatInterval: 30
    maxConcurrency: 2
    broker:
      address: "127.0.0.1"
      port: 5679
    external:
      mainNodeAuthToken: ""
      workerNodeAuthToken: ""
      autoShutdownTimeout: 15
      port: 5680
      nodeOptions:
        - "--max-semi-space-size=16"
        - "--max-old-space-size=300"
      resources:
        requests:
          cpu: 100m
          memory: 32Mi
        limits:
          cpu: 250m
          memory: 256Mi

  timezone: "Africa/Johannesburg"
  defaultLocale: en
  gracefulShutdownTimeout: 30

  ingress:
    enabled: true
    className: nginx
    annotations:
      nginx.ingress.kubernetes.io/proxy-body-size: "50m"
      # kubernetes.io/tls-acme: "true"
    hosts:
      - host: n8n.westdynamics.io
        paths:
          - path: /
            pathType: Prefix
    tls: []
    #  - secretName: n8n-tls
    #    hosts:
    #      - n8n.local

  redis:
    enabled: true
    architecture: standalone

    image:
      repository: bitnamilegacy/redis

    auth:
      enabled: true

    master:
      service:
        ports:
          redis: 6379

      persistence:
        enabled: false

  externalPostgresql:
    host: postgres-postgresql.storage.svc.cluster.local
    port: 5432
    username: n8n
    database: n8n
    # ❗ leave password empty OR remove it
    # password: ""
    existingSecret: n8n-secret

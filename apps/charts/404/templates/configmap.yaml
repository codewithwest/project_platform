apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "custom-error-pages.fullname" . | quote }}
  namespace: {{ .Values.namespace | quote }}
data:
  404.html: |
{{ .Values.html.error404 | indent 4 }}
  500.html: |
{{ .Values.html.error500 | indent 4 }}
  502.html: |
{{ .Values.html.error502 | indent 4 }}
  504.html: |
{{ .Values.html.error504 | indent 4 }}
  default.conf: |
    server {
        listen 80;
        server_name localhost;
        root /usr/share/nginx/html;

        location / {
            try_files $uri $uri/ /404.html;
        }

        error_page 404 /404.html;
        error_page 500 /500.html;
        error_page 502 /502.html;
        error_page 503 504 /504.html;

        location = /404.html { internal; }
        location = /500.html { internal; }
        location = /502.html { internal; }
        location = /504.html { internal; }
    }

apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "custom-error-pages.fullname" . | quote }}
  namespace: {{ .Values.namespace | quote }}
data:
  404.html: |
{{ .Values.html.error404 | indent 4 }}
  default.conf: |
    server {
        listen 80;
        server_name localhost;
        location / {
            root /usr/share/nginx/html;
            index 404.html;
        }
        error_page 404 /404.html;
        location = /404.html {
            root /usr/share/nginx/html;
            internal;
        }
    }

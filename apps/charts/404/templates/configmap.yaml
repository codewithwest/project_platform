apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "custom-error-pages.fullname" . | quote }}
  namespace: {{ .Values.namespace | quote }}
data:
  404.html: |
{{ .Values.html.error404 | indent 4 }}
  500.html: |
{{ .Values.html.error500 | indent 4 }}
  502.html: |
{{ .Values.html.error502 | indent 4 }}
  503.html: |
{{ .Values.html.error503 | indent 4 }}
  504.html: |
{{ .Values.html.error504 | indent 4 }}
  default.conf: |
    server {
        listen 80;
        server_name localhost;
        root /usr/share/nginx/html;

        # The Nginx Ingress controller sends all custom errors to /
        # with the real HTTP status code in the $http_x_code variable.
        location / {
            set $x_code $http_x_code;

            # Default to 404 if no code is provided
            if ($x_code = "") {
                set $x_code "404";
            }

            try_files /$x_code.html /404.html;
        }
    }

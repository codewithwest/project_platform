apiVersion: v1
kind: Service
metadata:
  name: {{ include "custom-error-pages.fullname" . | quote }}
  namespace: {{ .Values.namespace | quote }}
  labels:
    app: {{ include "custom-error-pages.name" . | quote }}
spec:
  type: {{ .Values.service.type | quote }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app: {{ include "custom-error-pages.name" . | quote }}

        <p>The service is currently undergoing maintenance or is temporarily unavailable. Please stand by while systems are restored.</p>
        <a href="/">Return to Gateway</a>
      </div>
      <script>
        const s = document.getElementById('stars');
        for (let i = 0; i < 80; i++) {
          const star = document.createElement('div');
          star.className = 'star';
          const size = Math.random() * 3 + 1;
          star.style.cssText = `width:${size}px;height:${size}px;top:${Math.random()*100}%;left:${Math.random()*100}%;--duration:${2+Math.random()*3}s;animation-delay:${Math.random()*5}s`;
          s.appendChild(star);
        }
      </script>
    </body>
    </html>

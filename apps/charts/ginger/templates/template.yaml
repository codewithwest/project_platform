apiVersion: v1
kind: Secret
metadata:
  name: ginger-secrets
  namespace: ginger-ai
type: Opaque
stringData:
  # LiteLLM Master Key (Must match LITELLM_PROXY_API_KEY in framework)
  LITELLM_MASTER_KEY: "sk-local-dev"
  LITELLM_PROXY_API_KEY: "sk-local-dev"
  LITELLM_SALT_KEY: "any-random-string"
  
  # LiteLLM Admin UI
  UI_USERNAME: "admin"
  UI_PASSWORD: "admin_password"

  # Database Connection
  # Format: postgresql://user:password@host:port/dbname
  AI_DATABASE_URL: "postgresql://llmproxy:llmproxy_password@postgres.default.svc.cluster.local:5432/ginger"
  LITELLM_DATABASE_URL: "postgresql://llmproxy:llmproxy_password@postgres.default.svc.cluster.local:5432/ginger"

  # n8n Integration
  N8N_API_KEY: "your-n8n-api-key"

  # Sentry (Optional)
  SENTRY_DSN: ""

apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ginger-models-pvc
  namespace: applications
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: microk8s-hostpath
  resources:
    requests:
      storage: 20Gi

apiVersion: apps/v1
kind: Deployment
metadata:
  name: ginger-app
  namespace: ginger-ai
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ginger-app
  template:
    metadata:
      labels:
        app: ginger-app
    spec:
      imagePullSecrets:
        - name: ghcr-pull-secret
      containers:
        - name: framework
          image: ghcr.io/westdynamics/ginger:devlatest
          imagePullPolicy: Always
          # ADDED: Resource constraints to prevent noisy neighbor issues
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          envFrom:
            - configMapRef:
                name: ginger-config
            - secretRef:
                name: ginger-secrets
          volumeMounts:
            - name: models-data
              mountPath: /app/models
      volumes:
        - name: models-data
          persistentVolumeClaim:
            claimName: ginger-models-pvc
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ginger-chromadb
  namespace: ginger-ai
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ginger-chromadb
  template:
    metadata:
      labels:
        app: ginger-chromadb
    spec:
      containers:
        - name: chromadb
          image: chromadb/chroma:latest
          ports:
            - containerPort: 8000
          volumeMounts:
            - name: chroma-data
              mountPath: /chroma/chroma
      volumes:
        - name: chroma-data
          persistentVolumeClaim:
            claimName: ginger-chroma-pvc
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ginger-worker
  namespace: ginger-ai
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ginger-worker
  template:
    metadata:
      labels:
        app: ginger-worker
    spec:
      imagePullSecrets:
        - name: ghcr-pull-secret
      containers:
        - name: worker
          image: ghcr.io/westdynamics/ginger:devlatest
          imagePullPolicy: Always
          command: ["python", "src/infrastructure/queue/worker.py"]
          # ADDED: Resource constraints
          resources:
            requests:
              memory: "512Mi"
              cpu: "500m"
            limits:
              memory: "1Gi"
              cpu: "1000m" # Workers usually need more juice for processing
          envFrom:
            - configMapRef:
                name: ginger-config
            - secretRef:
                name: ginger-secrets
          volumeMounts:
            - name: models-data
              mountPath: /app/models
      volumes:
        - name: models-data
          persistentVolumeClaim:
            claimName: ginger-models-pvc
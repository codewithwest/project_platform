apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ginger-ai
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/westdynamics/project_platform.git' # Update to your actual repo
    targetRevision: HEAD
    path: kubernetes
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: applications
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true

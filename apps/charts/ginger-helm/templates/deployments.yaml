apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "ginger.fullname" . }}-api
  labels:
    {{- include "ginger.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.ginger.api.replicas }}
  selector:
    matchLabels:
      {{- include "ginger.selectorLabels" . | nindent 6 }}
      component: api
  template:
    metadata:
      labels:
        {{- include "ginger.selectorLabels" . | nindent 8 }}
        component: api
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: api
          image: "{{ .Values.ginger.api.image.repository }}:{{ .Values.ginger.api.image.tag }}"
          imagePullPolicy: {{ .Values.ginger.api.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.ginger.api.port }}
              name: http
          envFrom:
            - configMapRef:
                name: {{ include "ginger.fullname" . }}-config
            - secretRef:
                name: {{ .Values.secrets.existingSecretName }}
          env:
            - name: AI_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: ginger-db-credentials
                  key: url
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: ginger-valkey-credentials
                  key: url
          resources:
            {{- toYaml .Values.ginger.api.resources | nindent 12 }}
          livenessProbe:
            {{- toYaml .Values.ginger.api.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.ginger.api.readinessProbe | nindent 12 }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "ginger.fullname" . }}-ui
  labels:
    {{- include "ginger.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.ginger.ui.replicas }}
  selector:
    matchLabels:
      {{- include "ginger.selectorLabels" . | nindent 6 }}
      component: ui
  template:
    metadata:
      labels:
        {{- include "ginger.selectorLabels" . | nindent 8 }}
        component: ui
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: ui
          image: "{{ .Values.ginger.ui.image.repository }}:{{ .Values.ginger.ui.image.tag }}"
          imagePullPolicy: {{ .Values.ginger.ui.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.ginger.ui.port }}
              name: http
          resources:
            {{- toYaml .Values.ginger.ui.resources | nindent 12 }}
          livenessProbe:
            {{- toYaml .Values.ginger.ui.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.ginger.ui.readinessProbe | nindent 12 }}
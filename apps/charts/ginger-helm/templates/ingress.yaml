apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "ginger.fullname" . }}-ingress
  labels:
    {{- include "ginger.labels" . | nindent 4 }}
  annotations:
    kubernetes.io/ingress.class: nginx
spec:
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "ginger.fullname" . }}-app
                port:
                  number: {{ .Values.ginger.service.port }}

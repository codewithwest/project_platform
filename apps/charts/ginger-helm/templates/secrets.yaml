apiVersion: v1
kind: Secret
metadata:
  name: {{ include "ginger.fullname" . }}-secrets
  labels:
    {{- include "ginger.labels" . | nindent 4 }}
type: Opaque
stringData:
  # These should be provided via --set or a secrets.yaml file (not committed)
  # or integrated with Sealed Secrets.
  LITELLM_DATABASE_URL: {{ .Values.secrets.litellmDbUrl | default "placeholder-db-url" }}
  LITELLM_API_KEY: {{ .Values.secrets.litellmApiKey | default "placeholder-api-key" }}

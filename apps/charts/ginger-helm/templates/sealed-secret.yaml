apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: ginger-api-secret
  namespace: { { .Values.global.namespace } }
spec:
  encryptedData:
    LITELLM_MASTER_KEY: ""
    LITELLM_PROXY_API_KEY: ""
  template:
    metadata:
      name: ginger-api-secret
      namespace: { { .Values.global.namespace } }
---

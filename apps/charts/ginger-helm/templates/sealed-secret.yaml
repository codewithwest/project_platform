  name: ginger-db-credentials
  namespace: { { .Values.global.namespace } }
spec:
  encryptedData:
    url: ""
  template:
    metadata:
      name: ginger-db-credentials
      namespace: { { .Values.global.namespace } }
---
apiVersion: bitnami.com/v1alpha1

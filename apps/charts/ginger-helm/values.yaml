global:
  namespace: applications

ginger:
  api:
    image:
      repository: ghcr.io/codewithwest/ginger-api
      tag: latest
      pullPolicy: Always
    replicas: 1
    port: 8007
    resources:
      requests:
        memory: "512Mi"
        cpu: "250m"
      limits:
        memory: "1Gi"
        cpu: "1"
    livenessProbe:
      httpGet:
        path: /health
        port: 8007
      initialDelaySeconds: 30
      periodSeconds: 15
      timeoutSeconds: 5
    readinessProbe:
      httpGet:
        path: /health
        port: 8007
      initialDelaySeconds: 15
      periodSeconds: 10
      timeoutSeconds: 5

  ui:
    image:
      repository: ghcr.io/codewithwest/ginger-ui
      tag: latest
      pullPolicy: Always
    replicas: 1
    port: 80
    resources:
      requests:
        memory: "64Mi"
        cpu: "50m"
      limits:
        memory: "128Mi"
        cpu: "200m"
    livenessProbe:
      httpGet:
        path: /
        port: 80
      initialDelaySeconds: 10
      periodSeconds: 15
    readinessProbe:
      httpGet:
        path: /
        port: 80
      initialDelaySeconds: 5
      periodSeconds: 10

imagePullSecrets: []

ingress:
  enabled: true
  className: nginx
  host: ginger.westdynamics.io
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "86400s"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "86400s"
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"

config:
  SERVICE_ROLE: "api"
  CHROMA_HTTP_HOST: "ginger-chromadb.storage.svc.cluster.local"
  CHROMA_HTTP_PORT: "8000"
  QDRANT_HOST: "ginger-qdrant.storage.svc.cluster.local"
  QDRANT_PORT: "6333"
  AGENTS_API_AUTH_DISABLED: "1"
  LITELLM_PROXY_URL: "http://litellm-proxy-litellm-proxy.applications.svc.cluster.local:4000"
  OLLAMA_BASE_URL: "http://ollama.applications.svc.cluster.local:11434"
  VISION_SERVICE_URL: "http://ginger-vision.applications.svc.cluster.local:8008"
  AUDIO_SERVICE_URL: "http://ginger-audio.applications.svc.cluster.local:8009"
  FLASK_INTERNAL_URL: "http://ginger-api.applications.svc.cluster.local:8007"

secrets:
  existingSecretName: "ginger-api-secret"
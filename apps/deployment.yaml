apiVersion: apps/v1
kind: Deployment
metadata:
  name: project-platform-deployment
  namespace: management
spec:
  replicas: 2
  selector:
    matchLabels:
      app: project-platform
  template:
    metadata:
      labels:
        app: project-platform
    spec:
      containers:
      - name: project-platform
        image: codewithwest/project_platform:latest # Argo CD will sync to the latest image
        ports:
        - containerPort: 3000
        env:
        - name: NODE_ENV
          value: development
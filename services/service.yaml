# combined-dashboard-argo-ingress.yaml
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: platform-default-ingress
  namespace: default 
  annotations:
    # 1. FIX: Use 'spec.ingressClassName' instead of the deprecated annotation
    # kubernetes.io/ingress.class: "nginx" 
    
    # Use annotation to define backend protocols for specific paths (required for HTTP/HTTPS mix)
    nginx.ingress.kubernetes.io/server-snippet: |
      # Rule for Argo CD
      location /argo/ {
        # Argo CD is on HTTP internally (port 8080)
        proxy_pass http://argocd-server.management.svc.cluster.local:8080;
      }
      # Rule for Kubernetes Dashboard
      location /dashboard/ {
        # Dashboard is on HTTPS internally (port 8443)
        proxy_pass https://kubernetes-dashboard.kubernetes-dashboard.svc.cluster.local:8443;
      }
    # Optional: Recommended to strip the path prefix before forwarding
    # Use the / prefix in rewrite target since the server-snippet is explicitly defined
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  # 2. FIX: Specify the Ingress Class here
  ingressClassName: nginx # <-- Use the name of your Ingress Controller Class
  rules:
  - http:
      paths:
      # 1. Path for Argo CD: Simplified path for Prefix pathType
      - path: /argo
        pathType: Prefix
        backend:
          service:
            name: argocd-server
            port:
              number: 80 # Must point to a valid service port
      
      # 2. Path for Kubernetes Dashboard: Simplified path for Prefix pathType
      - path: /dashboard
        pathType: Prefix
        backend:
          service:
            name: kubernetes-dashboard
            port:
              number: 443 # Must point to a valid service port
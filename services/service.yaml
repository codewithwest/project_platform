# combined-dashboard-argo-ingress.yaml
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: platform-default-ingress
  # You can define this Ingress in a generic namespace like 'default' or 'ingress-nginx'
  # since it references services in other namespaces.
  namespace: default 
  annotations:
    # Set the Ingress Controller (required for path-based routing)
    kubernetes.io/ingress.class: "nginx" 
    # Use annotation to define backend protocols for specific paths (required!)
    nginx.ingress.kubernetes.io/server-snippet: |
      # Rule for Argo CD
      location /argo {
        # Argo CD is on HTTP internally (port 8080)
        proxy_pass http://argocd-server.management.svc.cluster.local:8080;
      }
      # Rule for Kubernetes Dashboard
      location /dashboard {
        # Dashboard is on HTTPS internally (port 8443)
        proxy_pass https://kubernetes-dashboard.kubernetes-dashboard.svc.cluster.local:8443;
      }
    # Optional: Recommended to strip the path prefix before forwarding
    nginx.ingress.kubernetes.io/rewrite-target: /$2
spec:
  rules:
  # Since you don't use hostnames, we leave the host field blank or omit it
  - http:
      paths:
      # 1. Path for Argo CD
      - path: /argo(/|$)(.*)
        pathType: Prefix
        backend:
          service:
            # Note: We must point this to *a* valid service for the Ingress to be valid, 
            # even though the server-snippet is doing the heavy lifting.
            name: argocd-server
            port:
              # Pointing to the *Service's* declared port (likely 80 or 443 in the Service spec)
              number: 80 
      
      # 2. Path for Kubernetes Dashboard
      - path: /dashboard(/|$)(.*)
        pathType: Prefix
        backend:
          service:
            # Pointing to *a* valid service for the Ingress to be valid.
            name: kubernetes-dashboard
            port:
              # Pointing to the *Service's* declared port (likely 80 or 443 in the Service spec)
              number: 443
apiVersion: v1
kind: Service
metadata:
  name: argocd-server-nodeport
  namespace: management
spec:
  type: NodePort
  ports:
  - port: 80
    targetPort: 8080
    nodePort: 30080
    name: http
  - port: 443
    targetPort: 8080
    nodePort: 30443
    name: https
  selector:
    app.kubernetes.io/name: argocd-server
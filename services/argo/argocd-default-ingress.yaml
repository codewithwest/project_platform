# argocd-default-ingress.yaml
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: argocd-default-ingress
  # The namespace where Argo CD is installed (usually 'argocd')
  namespace: 
  annotations:
    # 1. Argo CD server usually runs on HTTPS
    nginx.ingress.kubernetes.io/backend-protocol: "HTTPS"
    # 2. Tell Nginx Ingress Controller to process this Ingress
    kubernetes.io/ingress.class: "nginx" 
    # Optional: Recommended for Argo CD to ensure UI resources load correctly
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true" 
    # Optional: If you are using a self-signed or internal certificate on the Argo CD server
    # nginx.ingress.kubernetes.io/ssl-passthrough: "true"
spec:
  # This section directs all traffic that doesn't match any specific 'rules'
  # to the Argo CD server service.
  defaultBackend:

    service:
      # The name of the Argo CD server Service (usually 'argocd-server')
      name: argocd-server
      port:
        # The service port for argocd-server (usually 443)
        number: 8443
---
# The ClusterRole and ClusterRoleBinding resources are completely unrelated to Argo CD, 
# so they have been removed from this Argo CD-specific file for clarity.
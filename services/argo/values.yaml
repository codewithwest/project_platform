apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: argo-cd-ingress
  namespace: management
  annotations:
    # Use the Nginx Ingress Controller
    kubernetes.io/ingress.class: "nginx"
    # Optional: For secure cookie handling
    nginx.ingress.kubernetes.io/backend-protocol: "HTTPS"
spec:
  rules:
  - host: argo.westdynamics.local # Your desired hostname
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            # The service name created by the Argo CD manifest
            name: argocd-server
            port:
              # The service port for HTTP (usually 80 or 443)
              number: 80

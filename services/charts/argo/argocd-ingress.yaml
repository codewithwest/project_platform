apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: argocd-server-ingress
  namespace: management
  annotations:
    nginx.ingress.kubernetes.io/backend-protocol: "HTTP"
spec:
  ingressClassName: nginx
  rules:
  - host: argo.westdynamics.internal
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: argo-argocd-server  # Fixed name to match your 'kubectl get svc' output
            port:
              number: 80              # Matches the port in your service list
argo:
  server:
    extraArgs:
      - --insecure # Allows the Ingress to talk to the pod over HTTP

  config:
    url: https://argo.westdynamics.io
    statusbadge.enabled: "false"

  ingress:
    enabled: true
    ingressClassName: nginx
    annotations:
      nginx.ingress.kubernetes.io/ssl-redirect: "true"
      nginx.ingress.kubernetes.io/backend-protocol: "HTTP"
    hosts:
      - argo.westdynamics.io
    tls:
      - secretName: argocd-server-tls
        hosts:
          - argo.westdynamics.io

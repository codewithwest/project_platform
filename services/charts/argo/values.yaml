# Minimal Argo CD values for the wrapper chart
# This nests configurations under the 'argo' key to match the dependency in Chart.yaml

argo:
  global:
    image:
      repository: quay.io/argoproj/argocd
      tag: "v2.10.4"
  
  configs:
    params:
      server.insecure: true

  controller:
    name: application-controller
    # High availability and resource settings can be added here
    resources:
      limits:
        cpu: 1000m
        memory: 1024Mi
      requests:
        cpu: 500m
        memory: 512Mi

  repoServer:
    name: repo-server

  server:
    name: server
    service:
      type: ClusterIP
    
    # Managed Ingress
    ingress:
      enabled: true
      ingressClassName: nginx
      annotations:
        nginx.ingress.kubernetes.io/ssl-redirect: "true"
        nginx.ingress.kubernetes.io/backend-protocol: "HTTP"
      hostname: argo.westdynamics.io
      hosts:
        - argo.westdynamics.io
      tls:
        - secretName: argocd-server-tls
          hosts:
            - argo.westdynamics.io

    # Automate the Ingress ConfigMap patch
    extraObjects:
      - apiVersion: v1
        kind: ConfigMap
        metadata:
          name: nginx-load-balancer-microk8s-conf
          namespace: ingress
        data:
          default-backend-service: "management/error-404:80"
          custom-http-errors: "404,500,502,503,504"

# Argo CD Helm values.yaml

server:
  extraArgs:
    - --insecure
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
      # Required when using ingress with HTTP backend

  config:
    url: https://argo.westdynamics.io
    statusbadge.enabled: "false"

  ingress:
    enabled: true
    ingressClassName: nginx

    annotations:
      nginx.ingress.kubernetes.io/ssl-redirect: "true"
      nginx.ingress.kubernetes.io/backend-protocol: "HTTP"

    hosts:
      - host: argo.westdynamics.io
        paths:
          - path: /
            pathType: Prefix

    tls:
      - secretName: argocd-server-tls
        hosts:
          - argo.westdynamics.io

# Optional but recommended
configs:
  params:
    server.insecure: true

# Disable Dex if not using SSO (optional)
dex:
  enabled: false

# Redis (leave enabled unless externalized)
redis:
  enabled: true

# Repo server tuning
repoServer:
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

# Application controller tuning
controller:
  resources:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      cpu: 1
      memory: 1Gi

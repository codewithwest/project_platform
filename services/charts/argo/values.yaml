# Note: Use 'argo-cd' or 'server' depending on your specific chart version.
# For the official argo-cd chart, 'server' is the top-level key.
apiVersion: networking.k8s.io/v1
kind: Ingress
argo:
  extraArgs:
    - --insecure # Required for the Ingress to talk to the pod over HTTP

  config:
    url: https://argo.westdynamics.io
    statusbadge.enabled: "false"

  ingress:
    enabled: true
    ingressClassName: nginx
    annotations:
      # These match your manual manifest perfectly
      nginx.ingress.kubernetes.io/ssl-redirect: "true"
      nginx.ingress.kubernetes.io/backend-protocol: "HTTP"
    hosts:
      - argo.westdynamics.io
    tls:
      - secretName: argocd-server-tls
        hosts:
          - argo.westdynamics.io

apiVersion: v1
kind: ConfigMap
metadata:
  name: argocd-cm
  namespace: management
  labels:
    app.kubernetes.io/name: argocd-cm
    app.kubernetes.io/part-of: argocd
data:
  # This tells Argo CD its external-facing identity
  url: https://argo.westdynamics.internal
  # We keep these from your previous setup
  statusbadge.enabled: "false"
  timeout.reconciliation: 120s
  timeout.reconciliation.jitter: 60s
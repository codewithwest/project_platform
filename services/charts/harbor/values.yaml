# Chart source: https://helm.goharbor.io
# Chart name: harbor
# Chart version: 1.15.0
#
# Deploy:
#   microk8s helm dependency build services/harbor/
#   microk8s helm install harbor services/harbor/ -n management

harbor:
  hostname: harbor.westdynamics.io
  externalURL: https://harbor.westdynamics.io
  harborAdminPassword: ""
  existingSecretAdminPassword: harbor-admin-secret

  expose:
    # 2. Switch from nodePort to ingress
    type: ingress
    tls:
      enabled: true
      certSource: secret
      # K8s TLS secret containing cert for harbor.westdynamics.io
      # Create with: kubectl create secret tls harbor-tls-secret -n management \
      #   --cert=wildcard.crt --key=wildcard.key
      # See README.md §4 for wildcard cert generation
      secretName: harbor-tls-secret
      commonName: "harbor.westdynamics.io"

    ingress:
      apiVersion: networking.k8s.io/v1
      hosts:
        core: harbor.westdynamics.io
      className: nginx
      annotations:
        ingress.kubernetes.io/ssl-redirect: "true"
        ingress.kubernetes.io/proxy-body-size: "0" # Crucial for pushing large Docker images
        nginx.ingress.kubernetes.io/proxy-body-size: "0"
        nginx.ingress.kubernetes.io/proxy-read-timeout: "900"
        nginx.ingress.kubernetes.io/proxy-send-timeout: "900"

  persistence:
    persistentVolumeClaim:
      registry:
        storageClass: microk8s-hostpath
        accessMode: ReadWriteOnce
        size: 15Gi
      chartmuseum:
        storageClass: microk8s-hostpath
        accessMode: ReadWriteOnce
        size: 2Gi
      jobservice:
        storageClass: microk8s-hostpath
        accessMode: ReadWriteOnce
        size: 2Gi

  portal:
    replicas: 1
  core:
    replicas: 1
  jobservice:
    replicas: 1
  registry:
    replicas: 1
  chartmuseum:
    replicas: 1

  database:
    type: internal

  redis:
    type: internal

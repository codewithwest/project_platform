# -- Overrides for the Controller
controller:
  componentName: "jenkins-controller"
  image:
    tag: "latest-jdk21" # Matching your preference
    tagLabel: jdk21

  # Resource management for your MicroK8s node
  resources:
    requests:
      cpu: "250m"
      memory: "512Mi"
    limits:
      cpu: "500m"
      memory: "1Gi" # Bumped to 2Gi to prevent OOM kills during plugin sync

  # The URL users and agents will use
  jenkinsUrl: "https://jenkins.westdynamics.io"

  # Essential plugins for your workflow
  installPlugins:
    - kubernetes:latest
    - git:latest
    - blueocean:latest
    - docker-workflow:latest
    - junit:latest
    - apache-httpcomponents-client-4-api:latest
    - credentials:latest
    - branch-api:latest
    - theme-manager:latest

  # Secure the Admin account (Chart will create a secret with these)
  admin:
    createSecret: true
    username: "admin"
    # Use: kubectl get secret jenkins -o jsonpath="{.data.jenkins-admin-password}" | base64 --decode
    # password: "your-password-here"

  # Persistence for MicroK8s (Uses 'standard' or 'microk8s-hostpath')
  persistence:
    enabled: true
    storageClass: "standard"
    size: "10Gi"

  # Ingress Controller Configuration
  ingress:
    enabled: true
    apiVersion: "networking.k8s.io/v1"
    ingressClassName: nginx
    hostName: jenkins.westdynamics.io
    annotations:
      kubernetes.io/ingress.class: nginx
      nginx.ingress.kubernetes.io/proxy-body-size: "50m"
      nginx.ingress.kubernetes.io/custom-http-errors: "404,502,503,504"
      nginx.ingress.kubernetes.io/default-backend: "error-404"
      # cert-manager.io/cluster-issuer: "letsencrypt-prod" # Optional: if using cert-manager
    tls:
      - secretName: jenkins-tls-secret
        hosts:
          - jenkins.westdynamics.io

  # Mount docker socket for Docker-out-of-Docker (DooD)
  # NOTE: Jenkins runs as UID 1000. Ensure /var/run/docker.sock on host is accessible.
  volumes:
    - name: docker-sock
      hostPath:
        path: /var/run/docker.sock
        type: Socket
  volumeMounts:
    - name: docker-sock
      mountPath: /var/run/docker.sock

  # Configuration as Code (JCasC)
  sidecars:
    configAutoReload:
      enabled: true
  JCasC:
    enabled: true
    defaultConfig: true

# -- Agent configuration
agent:
  enabled: true
  image:
    repository: "jenkins/inbound-agent"
    tag: "latest-jdk21"
  # Points to the internal K8s service name
  jenkinsUrl: 'http://{{ template "jenkins.fullname" . }}:{{ .Values.controller.servicePort }}'
  volumes:
    - type: HostPath
      hostPath:
        path: /var/run/docker.sock
      mountPath: /var/run/docker.sock

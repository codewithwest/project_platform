jenkins:
  controller:
    # Disable NodePort and use ClusterIP for internal K8s routing
    serviceType: ClusterIP
    servicePort: 8080
    targetPort: 8080
    
    # The URL users and agents will use (No port needed with Ingress)
    jenkinsUrl: "https://jenkins.westdynamics.io"

    image:
      tag: latest-jdk21

    # Resource management for your MicroK8s node
    resources:
      requests:
        cpu: 500m
        memory: 512Mi
      limits:
        cpu: 500m
        memory: 1Gi

    # Essential plugins for your workflow
    installPlugins:
      - kubernetes:latest
      - git:latest
      - blueocean:latest
      - docker-workflow:latest
      - junit:latest
      - apache-httpcomponents-client-4-api:latest
      - credentials:latest
      - branch-api:latest
      - theme-manager:latest

    persistence:
      enabled: true
      storageClass: standard
      size: 5Gi

    # Mount docker socket for Docker-out-of-Docker (DooD)
    volumes:
      - name: docker-sock
        hostPath:
          path: /var/run/docker.sock
          type: Socket
    volumeMounts:
      - name: docker-sock
        mountPath: /var/run/docker.sock

  # Ingress Controller Configuration
  # Ensure 'microk8s enable ingress' is run on the node
  ingress:
    enabled: true
    apiVersion: "networking.k8s.io/v1"
    ingressClassName: nginx
    hostName: jenkins.westdynamics.io
    annotations:
      kubernetes.io/ingress.class: nginx
      nginx.ingress.kubernetes.io/proxy-body-size: "50m"

  # Configuration as Code (JCasC)
  JCasC:
    enabled: true
    configScripts:
      # Sets the 'Jenkins URL' in System Settings automatically
      location: |
        unclassified:
          location:
            url: "https://jenkins.westdynamics.io"
      security: |
        jenkins:
          securityRealm:
            local:
              allowsSignup: false
              users:
                - id: "admin"
                  password: "${ADMIN_PASSWORD}"
          authorizationStrategy:
            loggedInUsersCanDoAnything:
              allowAnonymousRead: false

  # Agent configuration to use the internal ClusterIP service
  agent:
    enabled: true
    image:
      repository: docker
      tag: "29-cli"
    # Points to the internal K8s service name so traffic never leaves the cluster
    jenkinsUrl: "http://{{ template "jenkins.fullname" . }}:8080"
    privileged: false
    volumes:
      - type: HostPath
        hostPath:
          path: /var/run/docker.sock
        mountPath: /var/run/docker.sock
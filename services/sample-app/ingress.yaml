apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: node-hello-ingress
spec:
  rules:
  - host: node-hello.westdynamics.net # A DNS name for your service
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: node-hello-service
            port:
              number: 8001

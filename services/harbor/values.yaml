harbor:
  # 1. Update the hostname and externalURL to use HTTPS (No ports)
  hostname: harbor.westdynamics.io
  externalURL: https://harbor.westdynamics.io
  harborAdminPassword: "admin123"

  expose:
    # 2. Switch from nodePort to ingress
    type: ingress
    tls:
      enabled: true
      certSource: secret
      # This refers to the K8s secret containing your SSL certs
      secretName: harbor-tls-secret
      commonName: "harbor.westdynamics.io"

    ingress:
      hosts:
        core: harbor.westdynamics.io
      className: nginx
      annotations:
        ingress.kubernetes.io/ssl-redirect: "true"
        ingress.kubernetes.io/proxy-body-size: "0" # Crucial for pushing large Docker images
        nginx.ingress.kubernetes.io/proxy-body-size: "0"
        nginx.ingress.kubernetes.io/proxy-read-timeout: "900"
        nginx.ingress.kubernetes.io/proxy-send-timeout: "900"

  persistence:
    persistentVolumeClaim:
      registry:
        storageClass: microk8s-hostpath
        accessMode: ReadWriteOnce
        size: 5Gi
      chartmuseum:
        storageClass: microk8s-hostpath
        accessMode: ReadWriteOnce
        size: 1Gi
      jobservice:
        storageClass: microk8s-hostpath
        accessMode: ReadWriteOnce
        size: 1Gi

  portal:
    replicas: 1
  core:
    replicas: 1
  jobservice:
    replicas: 1
  registry:
    replicas: 1
  chartmuseum:
    replicas: 1

  database:
    type: internal

  redis:
    type: internal

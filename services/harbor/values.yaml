# Harbor Helm chart values for Minikube with NodePort

# Global Settings
hostname: harbor.west.home
externalURL: http://harbor.west.home:30082
harborAdminPassword: "admin123"

# Expose Harbor using NodePort
expose:
  type: nodePort
  nodePort:
    ports:
      http:
        port: 80
        nodePort: 30082
      https:
        port: 443
        nodePort: 30445
  tls:
    enabled: false

  auto:
  commonName: "192.168.100.40"
  altNames:
    - "192.168.100.40"
    - "harbor.local"
    - "harbor.west.home"

# Persistence Settings
persistence:
  persistentVolumeClaim:
    registry:
      storageClass: standard
      accessMode: ReadWriteOnce
      size: 5Gi
    chartmuseum:
      storageClass: standard
      accessMode: ReadWriteOnce
      size: 1Gi
    jobservice:
      storageClass: standard
      accessMode: ReadWriteOnce
      size: 1Gi

# Resource Limits (for Minikube)
portal:
  replicas: 1
core:
  replicas: 1
jobservice:
  replicas: 1
registry:
  replicas: 1
chartmuseum:
  replicas: 1

# Internal Database and Redis
database:
  type: internal
redis:
  type: internal

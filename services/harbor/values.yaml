harbor:
  hostname: harbor.west.home
  externalURL: http://harbor.west.home:30082
  harborAdminPassword: "admin123"

  expose:
    type: nodePort
    nodePort:
      ports:
        http:
          port: 80
          nodePort: 30082
        https:
          port: 443
          nodePort: 30445
    tls:
      enabled: true
      commonName: "192.168.100.46"
      altNames:
        - "192.168.100.46"
        - "harbor.local"
        - "harbor.west.home"

  persistence:
    persistentVolumeClaim:
      registry:
        storageClass: standard
        accessMode: ReadWriteOnce
        size: 5Gi
      chartmuseum:
        storageClass: standard
        accessMode: ReadWriteOnce
        size: 1Gi
      jobservice:
        storageClass: standard
        accessMode: ReadWriteOnce
        size: 1Gi

  portal:
    replicas: 1
  core:
    replicas: 1
  jobservice:
    replicas: 1
  registry:
    replicas: 1
  chartmuseum:
    replicas: 1

  database:
    type: internal

  redis:
    type: internal
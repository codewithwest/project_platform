controller:
  serviceType: NodePort
  servicePort: 8080
  nodePort: 30090
  image:
    tag: 'latest-jdk21'
  persistence:
    enabled: true
    storageClass: "standard"
    size: 5Gi
  resources:
    requests:
      cpu: "250m"
      memory: "512Mi"
    limits:
      cpu: "500m"
      memory: "1Gi"
  installPlugins:
    - kubernetes:latest
    - git:latest
    - blueocean:latest 
    - docker-workflow:latest
    - junit:latest
    - apache-httpcomponents-client-4-api:latest
    - credentials:latest    
    - branch-api:latest
    - theme-manager:latest
  startupProbe:
    initialDelaySeconds: 120
    periodSeconds: 30
    failureThreshold: 10
  volumes:
    - name: docker-sock
      hostPath:
        path: /var/run/docker.sock
        type: Socket
  volumeMounts:
    - name: docker-sock
      mountPath: /var/run/docker.sock
  sidecars:
    - name: config-reload
      env:
        - name: REQ_RETRY_CONNECT
          value: "60" # Increase the number of retries
        - name: REQ_INITIAL_DELAY
          value: "120" # Add a startup delay in seconds
      # Mounts and other configuration from the default chart
  # This is the correct location for JCasC configuration
  JCasC:
    enabled: true
    # The configScripts block will be rendered as a ConfigMap.
    # The key (e.g., "jenkins-security") becomes the filename.
    configScripts:
      jenkins-security: |
        jenkins:
          securityRealm:
            local:
              allowsSignup: false
              users:
                - id: "admin"
                  password: "${ADMIN_PASSWORD}"

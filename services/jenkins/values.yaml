# Source: https://charts.jenkins.io
controller:
  serviceType: NodePort
  image:
    tag: 'lts-jdk17'
  persistence:
    enabled: true
    storageClass: "standard" # Use a storage class if available, otherwise Minikube's default will work
    size: 5Gi
  resources:
    requests:
      cpu: "250m"
      memory: "512Mi"
    limits:
      cpu: "500m"
      memory: "1Gi"
  # You can specify custom plugins here
  installPlugins:
    - kubernetes:4158.v3b_6b_1492b_b_13
    - git:5.2.2
    - blueocean:1.27.16 
    - docker-workflow:580.vc0c340686b_54 
    - junit:1307.vdd5b_2646279e 
    - apache-httpcomponents-client-4-api:4.5.14-208.v438351942757
    - credentials:1384.vf0a_2ed06f9c6    
    - branch-api:2.1193.v64a_61471c489
  # controller:
  # ... other controller settings ...
  # Add the volumes block to define the hostPath volume
  volumes:
    - name: docker-sock
      hostPath:
        path: /var/run/docker.sock
        type: Socket
  # Add the volumeMounts block to mount the volume into the Jenkins container
  volumeMounts:
    - name: docker-sock
      mountPath: /var/run/docker.sock

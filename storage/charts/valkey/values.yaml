# ==========================================
# Valkey (Redis Replacement) Deployment Setup
# ==========================================
global:
  imageRegistry: ""
  imagePullSecrets: []

image:
  registry: "docker.io"
  repository: valkey/valkey
  tag: "7.2.4" # Pin a specific, valid image tag to resolve the initContainer loop
  pullPolicy: IfNotPresent

# -- Enable authentication safely
auth:
  enabled: true
  aclUsers:
    default:
      permissions: "~* &* +@all"
      password: "ChooseASecurePassword123!"

# -- Match your persistence to the correct dataStorage object structure from your chart
dataStorage:
  enabled: true
  volumeName: "valkey-data"
  requestedSize: "8Gi"
  className: "microk8s-hostpath" # Directly mapping your local path volume engine
  accessModes:
    - ReadWriteOnce
  keepPvc: true

# -- Resource configurations mapped to prevent OOM termination
resources:
  limits:
    cpu: "1"
    memory: "3Gi"
  requests:
    cpu: "250m"
    memory: "1.5Gi"

# -- Append database performance logic
valkeyConfig: |
  appendonly yes
  appendfsync everysec
  maxmemory 2gb
  maxmemory-policy allkeys-lru
version: "3"

services:
  pihole:
    image: pihole/pihole:latest
    container_name: pihole
    network_mode: bridge
    ports:
      - "8081:80" # web UI
      - "8443:443" # optional HTTPS
      - "53:53/tcp" # DNS TCP
      - "53:53/udp"
    environment:
      TZ: Africa/Johannesburg
      WEBPASSWORD: admin
    volumes:
      - ./pihole/etc-pihole:/etc/pihole
      - ./pihole/etc-dnsmasq.d:/etc/dnsmasq.d
    restart: unless-stopped
